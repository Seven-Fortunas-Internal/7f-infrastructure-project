[mutmut]
paths_to_mutate = scripts/bounded_retry.py
tests_dir = tests/unit/python/test_bounded_retry.py
also_copy =
    scripts/circuit_breaker.py
    scripts/classify-failure-logs.py

# ---------------------------------------------------------------------------
# Per-script mutation runs (Sprint 7)
# ---------------------------------------------------------------------------
# Run each script separately to target the right test file:
#
#   bounded_retry (default above):
#     mutmut run
#     mutmut results
#
#   circuit_breaker.py (≥85% target):
#     mutmut run \
#       --paths-to-mutate scripts/circuit_breaker.py \
#       --tests-dir tests/unit/python/test_circuit_breaker.py \
#       --also-copy scripts/bounded_retry.py \
#       --also-copy scripts/classify-failure-logs.py
#
#   classify-failure-logs.py (≥80% target):
#     mutmut run \
#       --paths-to-mutate scripts/classify-failure-logs.py \
#       --tests-dir tests/unit/python/test_classify_failure_logs.py \
#       --also-copy scripts/bounded_retry.py \
#       --also-copy scripts/circuit_breaker.py
# ---------------------------------------------------------------------------
