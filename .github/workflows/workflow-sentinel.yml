name: Workflow Sentinel (FR-9.1)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_run:
    workflows:
      - "AI Weekly Summary"
      - "API Rate Limit Monitoring"
      - "Auto-merge Dependabot PRs"
      - "CI Canary (Failure Test)"
      - "CI Health Weekly Report (NFR-8.5)"
      - "CI Weekly Health Report"
      - "Collect SOC 2 Evidence"
      - "Collect System Metrics"
      - "Compliance Evidence Collection"
      - "Dashboard Auto-Update (Optimized)"
      - "Dashboard Data Snapshot"
      - "Dependabot Auto-Merge (SLA Compliance)"
      - "Deploy AI Dashboard to GitHub Pages"
      - "Deploy Website"
      - "Monitor API Rate Limits"
      - "Monitor Dashboard Performance"
      - "Monitor Dependency Resilience"
      - "Monthly Access Control Audit"
      - "Monthly Vulnerability SLA Audit"
      - "Pre-Commit Validation"
      - "Project Progress Dashboard Update"
      - "Python Static Analysis (FR-10.3)"
      - "Quarterly Secret Detection Validation"
      - "Secret Reference Audit (FR-10.2)"
      - "Secret Scanning"
      - "SOC 2 Control Monitoring"
      - "SOC 2 Evidence Collection"
      - "Sync Sprint Boards"
      - "Test Coverage Validation"
      - "Test Suite"
      - "Track Workflow Reliability"
      - "Update AI Advancements Dashboard"
      - "Update Project Progress Dashboard"
      - "Weekly AI Summary"
      - "Workflow Compliance Gate (NFR-5.6)"
      - "Lighthouse CI (P5-003 / P5-005)"
      - "Validate Second Brain Frontmatter (P5-002)"
    types:
      - completed

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

jobs:
  detect-failure:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'

    # Ensure only one sentinel run per workflow to prevent race conditions
    concurrency:
      group: sentinel-${{ github.event.workflow_run.name }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Record failure metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "Workflow Failure Detected"
          echo "  Workflow: $WORKFLOW_NAME"
          echo "  Run ID: $RUN_ID"
          echo "  Conclusion: $CONCLUSION"
          echo "  URL: $RUN_URL"
          echo "  Detected at: $TIMESTAMP"

          # Create failure metadata directory
          mkdir -p compliance/workflow-failures

          # Per-run temp directory (HIGH-004: no shared /tmp/ race condition)
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          # Fetch job details to get failed job names
          gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | {name: .name, conclusion: .conclusion, started_at: .started_at, completed_at: .completed_at}' \
            > "$TMP_DIR/failed_jobs.json"

          # Extract failed job names
          FAILED_JOB_NAMES=$(jq -r '.name' "$TMP_DIR/failed_jobs.json" | tr '\n' ',' | sed 's/,$//')

          echo "  Failed jobs: $FAILED_JOB_NAMES"

          # Record failure metadata in JSONL format
          printf '{"timestamp": "%s", "workflow_name": "%s", "run_id": "%s", "conclusion": "%s", "failed_jobs": "%s", "run_url": "%s", "detected_by": "workflow-sentinel"}\n' \
            "${TIMESTAMP}" "${WORKFLOW_NAME}" "${RUN_ID}" "${CONCLUSION}" "${FAILED_JOB_NAMES}" "${RUN_URL}" \
            >> compliance/workflow-failures/failures.jsonl

      - name: Fetch job logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          echo "Fetching job logs for run $RUN_ID..."

          # Per-run temp directory (HIGH-004: no shared /tmp/ race condition)
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          # Get job details with log URLs
          gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            > "$TMP_DIR/job_details.json"

          # Extract failed job IDs
          FAILED_JOB_IDS=$(jq -r '.jobs[] | select(.conclusion == "failure") | .id' "$TMP_DIR/job_details.json")

          # Download logs for each failed job
          mkdir -p compliance/workflow-failures/logs

          for JOB_ID in $FAILED_JOB_IDS; do
            JOB_NAME=$(jq -r ".jobs[] | select(.id == $JOB_ID) | .name" "$TMP_DIR/job_details.json")
            LOG_FILE="compliance/workflow-failures/logs/${RUN_ID}_${JOB_ID}_$(echo "$JOB_NAME" | tr ' ' '_').log"

            echo "  Downloading logs for job: $JOB_NAME (ID: $JOB_ID)"

            # Fetch job logs via API (HIGH-003: removed 2>/dev/null so errors are visible)
            gh api "repos/${{ github.repository }}/actions/jobs/${JOB_ID}/logs" \
              > "$LOG_FILE" || echo "Failed to download logs for job $JOB_ID" > "$LOG_FILE"

            # HIGH-003: Validate log file is non-empty and not an error stub
            if [[ ! -s "$LOG_FILE" ]] || grep -q "^Failed to download logs" "$LOG_FILE"; then
              echo "::warning::No valid logs for job $JOB_ID — skipping classification"
              echo '{"category":"unknown","pattern":"No logs available","is_retriable":false,"root_cause":"Log download failed","suggested_fix":"Check runner permissions"}' \
                > "compliance/ci-health/classifications/${RUN_ID}_${JOB_ID}.json"
              mkdir -p compliance/ci-health/classifications
              echo '{"category":"unknown","pattern":"No logs available","is_retriable":false,"root_cause":"Log download failed","suggested_fix":"Check runner permissions"}' \
                > "compliance/ci-health/classifications/${RUN_ID}_${JOB_ID}.json"
              continue
            fi
          done

          echo "Job logs downloaded to compliance/workflow-failures/logs/"

      - name: Set up Python for log analysis
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -q anthropic

      - name: Classify failures with AI (FR-9.2)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          echo "Classifying failures using AI-powered log analysis..."

          # Create classification directory
          mkdir -p compliance/ci-health/classifications

          # Classify each failed job
          for LOG_FILE in compliance/workflow-failures/logs/${RUN_ID}_*.log; do
            if [ ! -f "$LOG_FILE" ]; then
              continue
            fi

            # Extract job ID and name from filename
            BASENAME=$(basename "$LOG_FILE" .log)
            JOB_ID=$(echo "$BASENAME" | cut -d'_' -f2)
            JOB_NAME=$(echo "$BASENAME" | cut -d'_' -f3- | tr '_' ' ')

            CLASSIFICATION_FILE="compliance/ci-health/classifications/${RUN_ID}_${JOB_ID}.json"

            echo "  Classifying: $JOB_NAME (ID: $JOB_ID)"

            # Call classification script
            python3 scripts/classify-failure-logs.py \
              --log-file "$LOG_FILE" \
              --workflow-name "$WORKFLOW_NAME" \
              --job-name "$JOB_NAME" \
              --run-id "$RUN_ID" \
              --output "$CLASSIFICATION_FILE" \
              || echo "{\"category\": \"unknown\", \"pattern\": \"Classification failed\", \"is_retriable\": false, \"root_cause\": \"Script error\", \"suggested_fix\": \"Manual review required\"}" > "$CLASSIFICATION_FILE"

            # Display classification
            CATEGORY=$(jq -r '.category' "$CLASSIFICATION_FILE")
            IS_RETRIABLE=$(jq -r '.is_retriable' "$CLASSIFICATION_FILE")
            echo "    -> Category: $CATEGORY | Retriable: $IS_RETRIABLE"
          done

          echo "Failure classifications saved to compliance/ci-health/classifications/"

      - name: Create failure summary
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          # Count total failures in last 24 hours
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%S)
          RECENT_FAILURES=$(awk -v cutoff="$CUTOFF" -F'"' '$4 > cutoff' compliance/workflow-failures/failures.jsonl 2>/dev/null | wc -l || echo 0)

          echo "## Workflow Failure Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** $WORKFLOW_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** $RUN_ID" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $RUN_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Detected at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Recent failures (24h):** $RECENT_FAILURES" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Detection Latency:** <5 minutes (FR-9.1 SLA)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "- Failure metadata recorded in \`compliance/workflow-failures/failures.jsonl\`" >> $GITHUB_STEP_SUMMARY
          echo "- Job logs saved to \`compliance/workflow-failures/logs/\`" >> $GITHUB_STEP_SUMMARY
          echo "- AI classifications saved to \`compliance/ci-health/classifications/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Classifications drive FR-9.3 (Auto-Retry) and FR-9.4 (Issue Creation)" >> $GITHUB_STEP_SUMMARY

      - name: Commit failure data to main branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Check if there are changes to commit
          git add compliance/workflow-failures/ compliance/ci-health/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(sentinel): Record workflow failure - $WORKFLOW_NAME (run $RUN_ID)"

            # MED-001: Surface rebase conflicts instead of silently ignoring
            if ! git pull --rebase origin main; then
              git rebase --abort
              echo "::warning::Rebase conflict on sentinel push — proceeding without rebase"
            fi

            # CRIT-002: Signal push failure with ::error:: annotation and env flag
            git push origin HEAD:main || {
              echo "::error::Sentinel push failed — failure metadata not persisted to git"
              echo "SENTINEL_PUSH_FAILED=true" >> "$GITHUB_ENV"
            }
          fi
        continue-on-error: true

      - name: Sentinel push failure summary
        if: always()
        run: |
          if [[ "${SENTINEL_PUSH_FAILED:-}" == "true" ]]; then
            echo "::warning::Sentinel git push failed in this run. Failure metadata is available via artifacts only."
            echo "**WARNING: Sentinel push failed** — failure metadata not persisted to git." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload classification artifacts (FR-9.2)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-classifications-${{ github.event.workflow_run.id }}
          path: compliance/ci-health/classifications/
          retention-days: 7
          if-no-files-found: warn

  auto-retry:
    runs-on: ubuntu-latest
    needs: detect-failure
    if: github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download classification data
        uses: actions/download-artifact@v4
        with:
          name: sentinel-classifications-${{ github.event.workflow_run.id }}
          path: compliance/ci-health/classifications/
        continue-on-error: true

      - name: Check if failure is retriable (FR-9.3)
        id: check-retriable
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "Checking if failure is retriable for run $RUN_ID..."

          # Find all classification files for this run
          CLASSIFICATION_FILES=$(ls compliance/ci-health/classifications/${RUN_ID}_*.json 2>/dev/null || echo "")

          if [ -z "$CLASSIFICATION_FILES" ]; then
            echo "No classification files found for run $RUN_ID"
            echo "retriable=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any classification has is_retriable: true
          IS_RETRIABLE="false"
          for FILE in $CLASSIFICATION_FILES; do
            RETRIABLE=$(jq -r '.is_retriable' "$FILE")
            if [ "$RETRIABLE" = "true" ]; then
              IS_RETRIABLE="true"
              CATEGORY=$(jq -r '.category' "$FILE")
              PATTERN=$(jq -r '.pattern' "$FILE")
              echo "Found retriable failure: $PATTERN (category: $CATEGORY)"
            fi
          done

          echo "retriable=$IS_RETRIABLE" >> $GITHUB_OUTPUT
          echo "Retriable: $IS_RETRIABLE"

      - name: Check retry count (NFR-4.5 Circuit Breaker)
        id: check-retry-count
        if: steps.check-retriable.outputs.retriable == 'true'
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "Checking retry count for run $RUN_ID..."

          # Check if this run has already been retried
          mkdir -p compliance/ci-health/retries

          RETRY_LOG="compliance/ci-health/retries/${RUN_ID}.json"

          if [ -f "$RETRY_LOG" ]; then
            RETRY_COUNT=$(jq -r '.retry_count // 0' "$RETRY_LOG")
            echo "This run has already been retried $RETRY_COUNT time(s)"

            if [ "$RETRY_COUNT" -ge 1 ]; then
              echo "Max retry limit (1) reached for run $RUN_ID"
              echo "allow_retry=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "Retry allowed (retry count: 0)"
          echo "allow_retry=true" >> $GITHUB_OUTPUT

      - name: Wait 60 seconds before retry (FR-9.3)
        if: steps.check-retriable.outputs.retriable == 'true' && steps.check-retry-count.outputs.allow_retry == 'true'
        run: |
          echo "Waiting 60 seconds before retrying workflow..."
          sleep 60
          echo "Wait complete"

      - name: Retry failed workflow (FR-9.3)
        id: retry-workflow
        if: steps.check-retriable.outputs.retriable == 'true' && steps.check-retry-count.outputs.allow_retry == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          echo "Retrying workflow: $WORKFLOW_NAME (run $RUN_ID)..."

          # Trigger retry via GitHub API
          RETRY_RESPONSE=$(gh api \
            --method POST \
            "repos/${{ github.repository }}/actions/runs/${RUN_ID}/rerun-failed-jobs" \
            2>&1) || {
              echo "Retry failed: $RETRY_RESPONSE"
              echo "retry_success=false" >> $GITHUB_OUTPUT
              exit 0
            }

          echo "Retry triggered successfully"
          echo "retry_success=true" >> $GITHUB_OUTPUT

          # Get the new run ID (GitHub creates a new run for the retry)
          sleep 5

          # Find the most recent run for this workflow
          RETRY_RUN_ID=$(gh run list \
            --workflow "$WORKFLOW_NAME" \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          echo "Retry run ID: $RETRY_RUN_ID"
          echo "retry_run_id=$RETRY_RUN_ID" >> $GITHUB_OUTPUT

      - name: Record retry outcome (FR-9.3)
        if: steps.check-retriable.outputs.retriable == 'true' && steps.check-retry-count.outputs.allow_retry == 'true'
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          RETRY_SUCCESS: ${{ steps.retry-workflow.outputs.retry_success }}
          RETRY_RUN_ID: ${{ steps.retry-workflow.outputs.retry_run_id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "Recording retry outcome..."

          mkdir -p compliance/ci-health/retries

          # Create retry record
          printf '{\n  "original_run_id": "%s",\n  "retry_run_id": "%s",\n  "workflow_name": "%s",\n  "retry_triggered_at": "%s",\n  "retry_success": %s,\n  "retry_count": 1,\n  "max_retries": 1,\n  "retry_resolved": null\n}\n' \
            "$RUN_ID" "$RETRY_RUN_ID" "$WORKFLOW_NAME" "$TIMESTAMP" "$RETRY_SUCCESS" \
            > "compliance/ci-health/retries/${RUN_ID}.json"

          echo "Retry outcome recorded in compliance/ci-health/retries/${RUN_ID}.json"

          # Add to retry log (JSONL)
          printf '{"timestamp": "%s", "original_run_id": "%s", "retry_run_id": "%s", "workflow_name": "%s", "retry_triggered": true}\n' \
            "$TIMESTAMP" "$RUN_ID" "$RETRY_RUN_ID" "$WORKFLOW_NAME" \
            >> compliance/ci-health/retries/retry-log.jsonl

      - name: Commit retry records
        if: steps.check-retriable.outputs.retriable == 'true' && steps.check-retry-count.outputs.allow_retry == 'true'
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add compliance/ci-health/retries/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(auto-retry): Retry workflow - $WORKFLOW_NAME (run $RUN_ID)"
            git push || echo "skipped - protected branch, retry records logged locally"
          fi
        continue-on-error: true

      - name: Create retry summary
        if: steps.check-retriable.outputs.retriable == 'true'
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RETRIABLE: ${{ steps.check-retriable.outputs.retriable }}
          ALLOW_RETRY: ${{ steps.check-retry-count.outputs.allow_retry }}
          RETRY_SUCCESS: ${{ steps.retry-workflow.outputs.retry_success }}
          RETRY_RUN_ID: ${{ steps.retry-workflow.outputs.retry_run_id }}
        run: |
          echo "## Auto-Retry Summary (FR-9.3)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** $WORKFLOW_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Original Run ID:** $RUN_ID" >> $GITHUB_STEP_SUMMARY

          if [ "$ALLOW_RETRY" = "true" ]; then
            if [ "$RETRY_SUCCESS" = "true" ]; then
              echo "**Status:** Retry triggered successfully" >> $GITHUB_STEP_SUMMARY
              echo "**Retry Run ID:** $RETRY_RUN_ID" >> $GITHUB_STEP_SUMMARY
              echo "**Next Steps:** Monitoring retry run outcome (FR-9.4 will create issue if retry fails)" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Status:** Retry failed to trigger" >> $GITHUB_STEP_SUMMARY
              echo "**Next Steps:** Manual intervention required" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**Status:** Retry not allowed (max retry limit reached)" >> $GITHUB_STEP_SUMMARY
            echo "**Next Steps:** Escalating to FR-9.4 (Issue Creation)" >> $GITHUB_STEP_SUMMARY
          fi

  create-issue:
    runs-on: ubuntu-latest
    needs: [detect-failure, auto-retry]
    if: always() && github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download classification data
        uses: actions/download-artifact@v4
        with:
          name: sentinel-classifications-${{ github.event.workflow_run.id }}
          path: compliance/ci-health/classifications/
        continue-on-error: true

      - name: Determine if issue needed (FR-9.4)
        id: check-issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          echo "Checking if GitHub Issue creation is needed for run $RUN_ID..."

          # Find classification files for this run
          CLASSIFICATION_FILES=$(ls compliance/ci-health/classifications/${RUN_ID}_*.json 2>/dev/null || echo "")

          if [ -z "$CLASSIFICATION_FILES" ]; then
            echo "No classification files found"
            echo "create_issue=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any failure is non-retriable OR if retry failed
          CREATE_ISSUE="false"
          REASON=""

          for FILE in $CLASSIFICATION_FILES; do
            IS_RETRIABLE=$(jq -r '.is_retriable' "$FILE")
            CATEGORY=$(jq -r '.category' "$FILE")
            PATTERN=$(jq -r '.pattern' "$FILE")

            if [ "$IS_RETRIABLE" = "false" ]; then
              CREATE_ISSUE="true"
              REASON="Non-retriable failure: $PATTERN"
              echo "Found non-retriable failure"
              break
            fi
          done

          # Check if retry failed
          RETRY_LOG="compliance/ci-health/retries/${RUN_ID}.json"
          if [ -f "$RETRY_LOG" ]; then
            # Wait 5 minutes for retry to complete
            echo "Retry was triggered. Waiting 5 minutes for retry to complete..."
            sleep 300

            # Check retry outcome
            RETRY_RUN_ID=$(jq -r '.retry_run_id' "$RETRY_LOG")
            if [ -n "$RETRY_RUN_ID" ] && [ "$RETRY_RUN_ID" != "null" ]; then
              RETRY_CONCLUSION=$(gh run view "$RETRY_RUN_ID" --json conclusion --jq '.conclusion' 2>/dev/null || echo "unknown")
              echo "Retry run $RETRY_RUN_ID conclusion: $RETRY_CONCLUSION"

              if [ "$RETRY_CONCLUSION" = "failure" ]; then
                CREATE_ISSUE="true"
                REASON="Retry failed"
                echo "Retry failed - issue needed"

                # Update retry log
                jq '.retry_resolved = false' "$RETRY_LOG" > "${RETRY_LOG}.tmp" && mv "${RETRY_LOG}.tmp" "$RETRY_LOG"
              elif [ "$RETRY_CONCLUSION" = "success" ]; then
                echo "Retry succeeded - no issue needed"
                jq '.retry_resolved = true' "$RETRY_LOG" > "${RETRY_LOG}.tmp" && mv "${RETRY_LOG}.tmp" "$RETRY_LOG"
                git add "$RETRY_LOG"
                git commit -m "chore: Retry resolved for run $RUN_ID" || true
                git push || echo "Push failed - logged locally"
              fi
            fi
          fi

          echo "create_issue=$CREATE_ISSUE" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT
          echo "Create issue: $CREATE_ISSUE ($REASON)"

      - name: Check circuit breaker (NFR-4.5)
        id: check-circuit-breaker
        if: steps.check-issue.outputs.create_issue == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          echo "Checking circuit breaker for $WORKFLOW_NAME..."

          # MED-003: Sanitize workflow name before use in gh issue list --search
          SAFE_WORKFLOW_NAME=$(echo "$WORKFLOW_NAME" | tr -d '"' | cut -c1-100)

          # Check for any open issue for this workflow — prevents daily re-filing
          OPEN_ISSUE_COUNT=$(gh issue list \
            --label "ci-failure" \
            --search "in:title \"$SAFE_WORKFLOW_NAME\"" \
            --state open \
            --json number \
            --jq 'length')

          echo "Open issues for this workflow: $OPEN_ISSUE_COUNT"

          if [ "$OPEN_ISSUE_COUNT" -ge 1 ]; then
            echo "Circuit breaker triggered: open issue already exists for $SAFE_WORKFLOW_NAME"
            echo "allow_issue=false" >> $GITHUB_OUTPUT
          else
            echo "Circuit breaker OK: no open issue for this workflow"
            echo "allow_issue=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for duplicate issues
        id: check-duplicate
        if: steps.check-issue.outputs.create_issue == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          echo "Checking for duplicate issues..."

          # MED-003: Sanitize workflow name before use in gh issue list --search
          SAFE_WORKFLOW_NAME=$(echo "$WORKFLOW_NAME" | tr -d '"' | cut -c1-100)

          # Get pattern from classification
          CLASSIFICATION_FILE=$(ls compliance/ci-health/classifications/${RUN_ID}_*.json 2>/dev/null | head -1)
          PATTERN=$(jq -r '.pattern' "$CLASSIFICATION_FILE")

          # Search for any open issue with same workflow name (pattern-independent)
          DUPLICATE_ISSUE=$(gh issue list \
            --label "ci-failure" \
            --state open \
            --search "in:title \"$SAFE_WORKFLOW_NAME\"" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$DUPLICATE_ISSUE" ]; then
            echo "Found duplicate open issue: #$DUPLICATE_ISSUE"
            echo "duplicate_issue=$DUPLICATE_ISSUE" >> $GITHUB_OUTPUT
            echo "is_duplicate=true" >> $GITHUB_OUTPUT
          else
            echo "No duplicate found"
            echo "is_duplicate=false" >> $GITHUB_OUTPUT
          fi

      - name: Add comment to duplicate issue
        if: steps.check-issue.outputs.create_issue == 'true' && steps.check-duplicate.outputs.is_duplicate == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          DUPLICATE_ISSUE: ${{ steps.check-duplicate.outputs.duplicate_issue }}
        run: |
          # Per-run temp directory (HIGH-004: no shared /tmp/ race condition)
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          TIMESTAMP=$(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)

          echo "Adding comment to issue #$DUPLICATE_ISSUE..."

          printf '%s\n' \
            "**Duplicate Failure Detected**" \
            "" \
            "Same failure pattern occurred again:" \
            "- **Run ID:** $RUN_ID" \
            "- **Run URL:** $RUN_URL" \
            "- **Timestamp:** $TIMESTAMP" \
            "" \
            "This issue remains open. Please investigate and resolve." \
            > "$TMP_DIR/duplicate_comment.txt"
          gh issue comment "$DUPLICATE_ISSUE" --body-file "$TMP_DIR/duplicate_comment.txt"

          echo "Comment added to issue #$DUPLICATE_ISSUE"

      - name: Create GitHub Issue (FR-9.4)
        if: steps.check-issue.outputs.create_issue == 'true' && steps.check-circuit-breaker.outputs.allow_issue == 'true' && steps.check-duplicate.outputs.is_duplicate == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          # Per-run temp directory (HIGH-004: no shared /tmp/ race condition)
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          TIMESTAMP=$(date -u +%Y-%m-%d)

          echo "Creating GitHub Issue for persistent failure..."

          # Get classification data
          CLASSIFICATION_FILE=$(ls compliance/ci-health/classifications/${RUN_ID}_*.json 2>/dev/null | head -1)
          CATEGORY=$(jq -r '.category' "$CLASSIFICATION_FILE")
          PATTERN=$(jq -r '.pattern' "$CLASSIFICATION_FILE")
          ROOT_CAUSE=$(jq -r '.root_cause' "$CLASSIFICATION_FILE")
          SUGGESTED_FIX=$(jq -r '.suggested_fix' "$CLASSIFICATION_FILE")
          JOB_NAME=$(jq -r '.metadata.job_name' "$CLASSIFICATION_FILE")

          # Get error excerpt from log
          LOG_FILE=$(ls compliance/workflow-failures/logs/${RUN_ID}_*.log 2>/dev/null | head -1)
          if [ -f "$LOG_FILE" ]; then
            ERROR_EXCERPT=$(tail -20 "$LOG_FILE" | head -c 500)
          else
            ERROR_EXCERPT="(Log not available)"
          fi

          # Determine priority based on category
          if [ "$CATEGORY" = "transient" ]; then
            PRIORITY="P2"
          else
            PRIORITY="P1"
          fi

          # Create issue title
          ISSUE_TITLE="[CI Failure] $WORKFLOW_NAME — $PATTERN ($TIMESTAMP)"

          # Create issue body
          {
            echo "## CI Workflow Failure"
            echo ""
            echo "**Workflow:** $WORKFLOW_NAME"
            echo "**Run ID:** $RUN_ID"
            echo "**Run URL:** $RUN_URL"
            echo "**Failed Job:** $JOB_NAME"
            echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "### Root Cause Analysis (AI-Generated)"
            echo ""
            echo "**Category:** $CATEGORY"
            echo "**Pattern:** $PATTERN"
            echo ""
            echo "**Root Cause:**"
            echo "$ROOT_CAUSE"
            echo ""
            echo "**Suggested Fix:**"
            echo "$SUGGESTED_FIX"
            echo ""
            echo "### Error Excerpt"
            echo ""
            echo '```'
            echo "$ERROR_EXCERPT"
            echo '```'
            echo ""
            echo "### Classification Data"
            echo ""
            echo "Full classification: [View JSON](../blob/main/compliance/ci-health/classifications/$(basename "$CLASSIFICATION_FILE"))"
            echo ""
            echo "---"
            echo ""
            echo "**Auto-generated by Workflow Sentinel (FR-9.4)**"
          } > "$TMP_DIR/issue_body.md"

          # Create issue (gh issue create outputs the URL of the created issue)
          ISSUE_URL=$(gh issue create \
            --title "$ISSUE_TITLE" \
            --body-file "$TMP_DIR/issue_body.md" \
            --label "ci-failure,$CATEGORY,$PRIORITY")
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')

          echo "Created issue #$ISSUE_NUMBER"
          echo "Issue URL: $ISSUE_URL"

      - name: Create issue summary
        if: steps.check-issue.outputs.create_issue == 'true'
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          CREATE_ISSUE: ${{ steps.check-issue.outputs.create_issue }}
          ALLOW_ISSUE: ${{ steps.check-circuit-breaker.outputs.allow_issue }}
          IS_DUPLICATE: ${{ steps.check-duplicate.outputs.is_duplicate }}
          DUPLICATE_ISSUE: ${{ steps.check-duplicate.outputs.duplicate_issue }}
        run: |
          echo "## Issue Creation Summary (FR-9.4)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** $WORKFLOW_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** $RUN_ID" >> $GITHUB_STEP_SUMMARY
          echo "**Create Issue:** $CREATE_ISSUE" >> $GITHUB_STEP_SUMMARY

          if [ "$ALLOW_ISSUE" = "false" ]; then
            echo "**Status:** Circuit breaker triggered (open issue already exists)" >> $GITHUB_STEP_SUMMARY
          elif [ "$IS_DUPLICATE" = "true" ]; then
            echo "**Status:** Comment added to existing issue #$DUPLICATE_ISSUE" >> $GITHUB_STEP_SUMMARY
          elif [ "$CREATE_ISSUE" = "true" ]; then
            echo "**Status:** New issue created" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** No issue needed (retry succeeded or not applicable)" >> $GITHUB_STEP_SUMMARY
          fi

  create-fix-pr:
    runs-on: ubuntu-latest
    needs: [detect-failure, create-issue]
    if: always() && github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download classification data
        uses: actions/download-artifact@v4
        with:
          name: sentinel-classifications-${{ github.event.workflow_run.id }}
          path: compliance/ci-health/classifications/
        continue-on-error: true

      - name: Check if fix PR applicable (FR-9.5)
        id: check-fix-applicable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          echo "Checking if automated fix PR is applicable..."

          # Get classification
          CLASSIFICATION_FILE=$(ls compliance/ci-health/classifications/${RUN_ID}_*.json 2>/dev/null | head -1)

          if [ ! -f "$CLASSIFICATION_FILE" ]; then
            echo "No classification found"
            echo "create_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CATEGORY=$(jq -r '.category' "$CLASSIFICATION_FILE")
          PATTERN=$(jq -r '.pattern' "$CLASSIFICATION_FILE")

          # Only create fix PRs for known_pattern category
          if [ "$CATEGORY" != "known_pattern" ]; then
            echo "Category is $CATEGORY (not known_pattern) - no fix PR"
            echo "create_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if pattern is fixable
          FIXABLE="false"
          FIX_TYPE=""

          if echo "$PATTERN" | grep -qi "branch.*protection\|protected.*branch\|push.*reject"; then
            FIXABLE="true"
            FIX_TYPE="branch_protection_push"
          elif echo "$PATTERN" | grep -qi "secret.*not.*found\|missing.*secret\|secret.*undefined"; then
            FIXABLE="true"
            FIX_TYPE="missing_secret"
          elif echo "$PATTERN" | grep -qi "permission.*denied\|insufficient.*permission\|permission.*required"; then
            FIXABLE="true"
            FIX_TYPE="wrong_permissions"
          fi

          if [ "$FIXABLE" = "false" ]; then
            echo "Pattern '$PATTERN' is not auto-fixable - will create issue only"
            echo "create_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Pattern is fixable: $FIX_TYPE"
          echo "create_pr=true" >> $GITHUB_OUTPUT
          echo "fix_type=$FIX_TYPE" >> $GITHUB_OUTPUT
          echo "pattern=$PATTERN" >> $GITHUB_OUTPUT

      - name: Check for existing fix PR (Circuit Breaker)
        id: check-existing-pr
        if: steps.check-fix-applicable.outputs.create_pr == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          echo "Checking for existing open fix PRs for $WORKFLOW_NAME..."

          # Search for open PRs with fix/ci-{workflow-name} prefix
          EXISTING_PR=$(gh pr list \
            --state open \
            --search "head:fix/ci- in:title \"$WORKFLOW_NAME\"" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "Found existing open fix PR: #$EXISTING_PR"
            echo "existing_pr=$EXISTING_PR" >> $GITHUB_OUTPUT
            echo "has_existing=true" >> $GITHUB_OUTPUT
          else
            echo "No existing open fix PR found"
            echo "has_existing=false" >> $GITHUB_OUTPUT
          fi

      - name: Create fix PR (FR-9.5)
        if: steps.check-fix-applicable.outputs.create_pr == 'true' && steps.check-existing-pr.outputs.has_existing == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          FIX_TYPE: ${{ steps.check-fix-applicable.outputs.fix_type }}
          PATTERN: ${{ steps.check-fix-applicable.outputs.pattern }}
        run: |
          # Per-run temp directory (HIGH-004: no shared /tmp/ race condition)
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          DATE=$(date -u +%Y-%m-%d)

          echo "Creating automated fix PR for $FIX_TYPE..."

          # Create fix branch
          BRANCH_NAME="fix/ci-${WORKFLOW_NAME// /-}-${DATE}"
          git checkout -b "$BRANCH_NAME"

          # Apply fix based on type
          # Note: This is a placeholder - actual fix generation would require
          # more sophisticated analysis of the workflow file and error context
          echo "# Automated Fix - Phase 2" > "$TMP_DIR/fix_note.txt"
          echo "" >> "$TMP_DIR/fix_note.txt"
          echo "This is a placeholder for FR-9.5 Phase 2 implementation." >> "$TMP_DIR/fix_note.txt"
          echo "Pattern detected: $PATTERN" >> "$TMP_DIR/fix_note.txt"
          echo "Fix type: $FIX_TYPE" >> "$TMP_DIR/fix_note.txt"
          echo "" >> "$TMP_DIR/fix_note.txt"
          echo "To complete Phase 2, implement pattern-specific fixes:" >> "$TMP_DIR/fix_note.txt"
          echo "- branch_protection_push: Update git push to use refs/heads/compliance" >> "$TMP_DIR/fix_note.txt"
          echo "- missing_secret: Add if: secrets.NAME != '' guard" >> "$TMP_DIR/fix_note.txt"
          echo "- wrong_permissions: Add required permission entry" >> "$TMP_DIR/fix_note.txt"

          mkdir -p compliance/ci-health/fix-prs
          echo "Pattern: $PATTERN" > "compliance/ci-health/fix-prs/${RUN_ID}.txt"
          echo "Fix Type: $FIX_TYPE" >> "compliance/ci-health/fix-prs/${RUN_ID}.txt"
          echo "Status: Phase 2 - Placeholder" >> "compliance/ci-health/fix-prs/${RUN_ID}.txt"

          git add compliance/ci-health/fix-prs/
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          COMMIT_MSG=$(printf 'fix(ci): auto-fix %s in %s\n\nPattern: %s\nRun ID: %s\n\nPhase 2 placeholder commit.\nActual fix implementation requires pattern-specific logic.' \
            "$FIX_TYPE" "$WORKFLOW_NAME" "$PATTERN" "$RUN_ID")
          git commit -m "$COMMIT_MSG"

          # Push branch
          git push origin "$BRANCH_NAME" || echo "skipped - protected branch"

          # Create PR
          {
            echo "## Automated CI Fix (FR-9.5 Phase 2)"
            echo ""
            echo "**Pattern Detected:** $PATTERN"
            echo "**Fix Type:** $FIX_TYPE"
            echo "**Original Run:** $RUN_ID"
            echo ""
            echo "### Phase 2 Implementation Note"
            echo ""
            echo "This PR is a **Phase 2 placeholder**. FR-9.5 requires:"
            echo "1. Pattern-specific fix generation logic"
            echo "2. Workflow file analysis and modification"
            echo "3. Testing infrastructure"
            echo ""
            echo "**Supported Patterns:**"
            echo "- \`branch_protection_push\`: Change git push to refs/heads/compliance"
            echo "- \`missing_secret\`: Add if: secrets.NAME != '' guard"
            echo "- \`wrong_permissions\`: Add required permission entry"
            echo ""
            echo "**Next Steps:**"
            echo "- Review this placeholder PR"
            echo "- Implement pattern-specific fix generation"
            echo "- Validate fix in isolated branch"
            echo "- Test with actual workflow failures"
            echo ""
            echo "---"
            echo "Auto-generated by Workflow Sentinel (FR-9.5)"
          } > "$TMP_DIR/pr_body.md"

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "fix(ci): auto-fix $FIX_TYPE in $WORKFLOW_NAME" \
            --body-file "$TMP_DIR/pr_body.md" \
            --label "ci-fix,automated"

          echo "Fix PR created on branch $BRANCH_NAME"

      - name: Add comment to existing PR
        if: steps.check-fix-applicable.outputs.create_pr == 'true' && steps.check-existing-pr.outputs.has_existing == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          EXISTING_PR: ${{ steps.check-existing-pr.outputs.existing_pr }}
          PATTERN: ${{ steps.check-fix-applicable.outputs.pattern }}
        run: |
          # Per-run temp directory (HIGH-004: no shared /tmp/ race condition)
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          echo "Adding comment to existing PR #$EXISTING_PR..."

          {
            echo "**Additional Occurrence Detected**"
            echo ""
            echo "Same failure pattern occurred again:"
            echo "- **Run ID:** $RUN_ID"
            echo "- **Run URL:** $RUN_URL"
            echo "- **Pattern:** $PATTERN"
            echo ""
            echo "Please review and merge this fix PR to resolve the recurring issue."
          } > "$TMP_DIR/pr_comment.txt"

          gh pr comment "$EXISTING_PR" --body-file "$TMP_DIR/pr_comment.txt"

          echo "Comment added to PR #$EXISTING_PR"

      - name: Create fix PR summary
        if: steps.check-fix-applicable.outputs.create_pr == 'true'
        env:
          CREATE_PR: ${{ steps.check-fix-applicable.outputs.create_pr }}
          HAS_EXISTING: ${{ steps.check-existing-pr.outputs.has_existing }}
          FIX_TYPE: ${{ steps.check-fix-applicable.outputs.fix_type }}
        run: |
          echo "## Fix PR Summary (FR-9.5)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fix Type:** $FIX_TYPE" >> $GITHUB_STEP_SUMMARY

          if [ "$HAS_EXISTING" = "true" ]; then
            echo "**Status:** Comment added to existing PR (circuit breaker)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** Automated fix PR created (Phase 2 placeholder)" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # scheduled-poll: Fallback trigger for P6-002 — fires every 5 minutes and
  # scans for failed runs that were NOT caught by workflow_run event delivery.
  # Runs ONLY when triggered by the schedule event (skipped for workflow_run).
  # ─────────────────────────────────────────────────────────────────────────────
  scheduled-poll:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    concurrency:
      group: sentinel-scheduled-poll
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python for log analysis
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -q anthropic

      - name: Poll for unprocessed failed runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_REPO: ${{ github.repository }}
        run: |
          # HIGH-004: isolated temp dir, cleaned on exit
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          # Cutoff: 15 minutes ago (match cron interval)
          CUTOFF=$(date -u -d '15 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Polling for failed runs since $CUTOFF"

          mkdir -p compliance/ci-health/classifications
          mkdir -p compliance/workflow-failures/logs

          PROCESSED_ANY=false

          # Watch list — same 37 workflows as workflow_run trigger
          WATCHED_WORKFLOWS=(
            "AI Weekly Summary"
            "API Rate Limit Monitoring"
            "Auto-merge Dependabot PRs"
            "CI Canary (Failure Test)"
            "CI Health Weekly Report (NFR-8.5)"
            "CI Weekly Health Report"
            "Collect SOC 2 Evidence"
            "Collect System Metrics"
            "Compliance Evidence Collection"
            "Dashboard Auto-Update (Optimized)"
            "Dashboard Data Snapshot"
            "Dependabot Auto-Merge (SLA Compliance)"
            "Deploy AI Dashboard to GitHub Pages"
            "Deploy Website"
            "Monitor API Rate Limits"
            "Monitor Dashboard Performance"
            "Monitor Dependency Resilience"
            "Monthly Access Control Audit"
            "Monthly Vulnerability SLA Audit"
            "Pre-Commit Validation"
            "Project Progress Dashboard Update"
            "Python Static Analysis (FR-10.3)"
            "Quarterly Secret Detection Validation"
            "Secret Reference Audit (FR-10.2)"
            "Secret Scanning"
            "SOC 2 Control Monitoring"
            "SOC 2 Evidence Collection"
            "Sync Sprint Boards"
            "Test Coverage Validation"
            "Test Suite"
            "Track Workflow Reliability"
            "Update AI Advancements Dashboard"
            "Update Project Progress Dashboard"
            "Weekly AI Summary"
            "Workflow Compliance Gate (NFR-5.6)"
            "Lighthouse CI (P5-003 / P5-005)"
            "Validate Second Brain Frontmatter (P5-002)"
          )

          for WORKFLOW_NAME in "${WATCHED_WORKFLOWS[@]}"; do
            echo "--- Checking: $WORKFLOW_NAME ---"

            # Fetch recent failed runs for this workflow (HIGH-003: no 2>/dev/null)
            FAILED_RUNS=$(gh run list \
              --repo "$GH_REPO" \
              --workflow "$WORKFLOW_NAME" \
              --status failure \
              --json databaseId,createdAt,htmlUrl \
              --jq "[.[] | select(.createdAt >= \"$CUTOFF\")] | .[].databaseId" \
              2>&1) || {
              echo "::warning::gh run list failed for workflow '$WORKFLOW_NAME': $FAILED_RUNS"
              continue
            }

            if [ -z "$FAILED_RUNS" ]; then
              echo "  No failed runs found since $CUTOFF"
              continue
            fi

            for RUN_ID in $FAILED_RUNS; do
              echo "  Evaluating run $RUN_ID..."

              # ── Deduplication check 1: classification file already exists ──
              EXISTING_CLASSIFICATION=$(ls \
                "compliance/ci-health/classifications/${RUN_ID}_"*.json \
                2>/dev/null | head -1 || true)
              if [ -n "$EXISTING_CLASSIFICATION" ]; then
                echo "  SKIP: Run $RUN_ID already classified ($EXISTING_CLASSIFICATION)"
                continue
              fi

              # ── Deduplication check 2: open issue with this run ID ──
              # MED-003: sanitize RUN_ID before passing to --search
              SAFE_RUN_ID=$(echo "$RUN_ID" | tr -d '"' | cut -c1-100)
              EXISTING_ISSUE=$(gh issue list \
                --repo "$GH_REPO" \
                --label "ci-failure" \
                --state open \
                --search "\"$SAFE_RUN_ID\" in:title" \
                --json number \
                --jq '.[0].number // empty' \
                2>&1) || {
                echo "::warning::gh issue list failed for run $RUN_ID: $EXISTING_ISSUE"
                EXISTING_ISSUE=""
              }
              if [ -n "$EXISTING_ISSUE" ]; then
                echo "  SKIP: Run $RUN_ID already has open issue #$EXISTING_ISSUE"
                continue
              fi

              echo "  UNPROCESSED: Run $RUN_ID — proceeding with classification"
              PROCESSED_ANY=true

              # ── Fetch run metadata ──
              RUN_META=$(gh run view "$RUN_ID" \
                --repo "$GH_REPO" \
                --json name,htmlUrl,conclusion \
                2>&1) || {
                echo "::warning::Could not fetch metadata for run $RUN_ID: $RUN_META"
                RUN_URL="https://github.com/$GH_REPO/actions/runs/$RUN_ID"
              }
              RUN_URL=$(echo "$RUN_META" | jq -r '.htmlUrl // empty' 2>/dev/null || \
                echo "https://github.com/$GH_REPO/actions/runs/$RUN_ID")

              # ── Download logs for failed jobs ──
              JOB_DATA=$(gh api \
                "repos/$GH_REPO/actions/runs/$RUN_ID/jobs" \
                --jq '.jobs[] | select(.conclusion == "failure") | {id: .id, name: .name}' \
                2>&1) || {
                echo "::warning::Could not fetch job data for run $RUN_ID: $JOB_DATA"
                JOB_DATA=""
              }

              if [ -z "$JOB_DATA" ]; then
                echo "  No failed job data — writing unknown classification"
                printf '{"category":"unknown","pattern":"No job data","is_retriable":false,"root_cause":"Scheduled poll could not fetch job details","suggested_fix":"Check runner permissions and retry manually"}\n' \
                  > "compliance/ci-health/classifications/${RUN_ID}_unknown.json"
                CLASSIFICATION_FILE="compliance/ci-health/classifications/${RUN_ID}_unknown.json"
                CATEGORY="unknown"
              else
                # Process each failed job
                FIRST_CLASSIFICATION_FILE=""
                FIRST_CATEGORY="unknown"

                while IFS= read -r JOB_LINE; do
                  JOB_ID=$(echo "$JOB_LINE" | jq -r '.id')
                  JOB_NAME=$(echo "$JOB_LINE" | jq -r '.name')
                  [ -z "$JOB_ID" ] && continue

                  LOG_FILE="compliance/workflow-failures/logs/${RUN_ID}_${JOB_ID}_scheduled.log"

                  # Download job logs (HIGH-003: no 2>/dev/null)
                  gh api "repos/$GH_REPO/actions/jobs/$JOB_ID/logs" \
                    > "$LOG_FILE" || {
                    echo "::warning::Log download failed for job $JOB_ID"
                    printf 'Log download failed for job %s\n' "$JOB_ID" > "$LOG_FILE"
                  }

                  CLASSIFICATION_FILE="compliance/ci-health/classifications/${RUN_ID}_${JOB_ID}.json"

                  # Classify using existing script
                  python3 scripts/classify-failure-logs.py \
                    --log-file "$LOG_FILE" \
                    --workflow-name "$WORKFLOW_NAME" \
                    --job-name "$JOB_NAME" \
                    --run-id "$RUN_ID" \
                    --output "$CLASSIFICATION_FILE" \
                    || printf '{"category":"unknown","pattern":"Classification failed","is_retriable":false,"root_cause":"Script error during scheduled poll","suggested_fix":"Manual review required"}\n' \
                      > "$CLASSIFICATION_FILE"

                  if [ -z "$FIRST_CLASSIFICATION_FILE" ]; then
                    FIRST_CLASSIFICATION_FILE="$CLASSIFICATION_FILE"
                    FIRST_CATEGORY=$(jq -r '.category // "unknown"' "$CLASSIFICATION_FILE" 2>/dev/null || echo "unknown")
                  fi
                done < <(echo "$JOB_DATA" | jq -c '.')

                CLASSIFICATION_FILE="${FIRST_CLASSIFICATION_FILE:-compliance/ci-health/classifications/${RUN_ID}_unknown.json}"
                CATEGORY="$FIRST_CATEGORY"
              fi

              # ── Commit classification data ──
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git add compliance/ci-health/ compliance/workflow-failures/ || true
              if ! git diff --staged --quiet; then
                git commit -m "chore(sentinel-poll): classify missed failure - $WORKFLOW_NAME (run $RUN_ID)" || true

                if ! git pull --rebase origin main; then
                  git rebase --abort || true
                  echo "::warning::Rebase conflict during scheduled poll push — proceeding"
                fi

                # CRIT-002: detect push failure
                git push origin HEAD:main || {
                  echo "::error::Scheduled poll push failed — classification not persisted to git"
                }
              fi

              # ── Create GitHub issue ──
              PATTERN=$(jq -r '.pattern // "Unknown error"' "$CLASSIFICATION_FILE" 2>/dev/null || echo "Unknown error")
              ROOT_CAUSE=$(jq -r '.root_cause // "Could not determine root cause"' "$CLASSIFICATION_FILE" 2>/dev/null || echo "Could not determine root cause")
              SUGGESTED_FIX=$(jq -r '.suggested_fix // "Manual review required"' "$CLASSIFICATION_FILE" 2>/dev/null || echo "Manual review required")
              JOB_NAME_META=$(jq -r '.metadata.job_name // "unknown"' "$CLASSIFICATION_FILE" 2>/dev/null || echo "unknown")

              # Determine priority
              if [ "$CATEGORY" = "transient" ]; then
                PRIORITY="P2"
              else
                PRIORITY="P1"
              fi

              ISSUE_TITLE="CI Failure: $WORKFLOW_NAME (Run $RUN_ID)"

              # MED-003: sanitize workflow name before issue search
              SAFE_WORKFLOW_NAME=$(echo "$WORKFLOW_NAME" | tr -d '"' | cut -c1-100)

              # Check circuit breaker: max 3 issues per workflow per 24h
              CUTOFF_24H=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%S)
              ISSUE_COUNT=$(gh issue list \
                --repo "$GH_REPO" \
                --label "ci-failure" \
                --search "in:title \"$SAFE_WORKFLOW_NAME\"" \
                --state all \
                --json createdAt \
                --jq "[.[] | select(.createdAt > \"$CUTOFF_24H\")] | length" \
                2>/dev/null || echo "0")

              if [ "${ISSUE_COUNT:-0}" -ge 3 ]; then
                echo "  Circuit breaker: max 3 issues/24h reached for $WORKFLOW_NAME — skipping issue"
                continue
              fi

              # Per-run temp dir for issue body (HIGH-004)
              ISSUE_TMP=$(mktemp -d)
              trap 'rm -rf "$ISSUE_TMP"' EXIT

              {
                echo "## CI Workflow Failure (Scheduled Poll Fallback)"
                echo ""
                echo "**Detected by:** Scheduled poll (workflow_run event was dropped)"
                echo "**Workflow:** $WORKFLOW_NAME"
                echo "**Run ID:** $RUN_ID"
                echo "**Run URL:** $RUN_URL"
                echo "**Failed Job:** $JOB_NAME_META"
                echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
                echo ""
                echo "### Root Cause Analysis (AI-Generated)"
                echo ""
                echo "**Category:** $CATEGORY"
                echo "**Pattern:** $PATTERN"
                echo ""
                echo "**Root Cause:**"
                echo "$ROOT_CAUSE"
                echo ""
                echo "**Suggested Fix:**"
                echo "$SUGGESTED_FIX"
                echo ""
                echo "---"
                echo ""
                echo "**Auto-generated by Workflow Sentinel scheduled poll (P6-002 fallback)**"
              } > "$ISSUE_TMP/issue_body.md"

              ISSUE_URL=$(gh issue create \
                --repo "$GH_REPO" \
                --title "$ISSUE_TITLE" \
                --body-file "$ISSUE_TMP/issue_body.md" \
                --label "ci-failure,$CATEGORY,$PRIORITY" \
                2>&1) || {
                echo "::warning::Failed to create issue for run $RUN_ID: $ISSUE_URL"
                ISSUE_URL=""
              }

              if [ -n "$ISSUE_URL" ]; then
                echo "  Created issue: $ISSUE_URL"
              fi

            done  # end for RUN_ID
          done  # end for WORKFLOW_NAME

          if [ "$PROCESSED_ANY" = "false" ]; then
            echo "Scheduled poll complete — no unprocessed failed runs found."
          else
            echo "Scheduled poll complete — processed at least one unprocessed failure."
          fi

      - name: Scheduled poll summary
        if: always()
        run: |
          echo "## Scheduled Poll Summary (P6-002 Fallback)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** schedule (*/15 * * * *)" >> $GITHUB_STEP_SUMMARY
          echo "**Purpose:** Catches workflow failures missed by workflow_run event delivery" >> $GITHUB_STEP_SUMMARY
          echo "**Deduplication:** Skips runs already in compliance/ci-health/classifications/ or with open issues" >> $GITHUB_STEP_SUMMARY
          echo "**Ran at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
