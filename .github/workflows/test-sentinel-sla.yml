name: Sentinel E2E SLA Test (P5-001 / P6-002)

# FR-9.1 end-to-end SLA assertion for the Workflow Sentinel pipeline.
#
# What this does:
#   1. Triggers CI Canary (Failure Test) via workflow_dispatch
#   2. Waits for the canary run to complete (expected: failure)
#   3. Polls for a new workflow-sentinel.yml run triggered AFTER canary completion
#   4. Waits for the sentinel run to reach a terminal conclusion
#   5. Asserts the sentinel run completed within 600s and concluded 'success'
#
# P6-002 change (replaces issue-polling from P5-001):
#   The previous version polled for a ci-failure GitHub Issue after canary completion.
#   Under high workflow concurrency, GitHub may delay or drop the workflow_run event
#   that triggers the sentinel — causing the SLA test to time out even when the
#   sentinel pipeline itself is healthy. The new approach polls gh run list for the
#   sentinel workflow run directly. This has one fewer dependency (eliminates the
#   issue-creation step from the SLA gate) and surfaces failures faster.
#
# Why 600s and not FR-9.1's "5 minutes":
#   FR-9.1 specifies detection latency. Full pipeline (detect + LLM classify +
#   issue create) realistically takes 5-10 minutes. 600s covers the E2E chain
#   while still catching complete sentinel failures. Tighten to 300s in a future
#   sprint if measured times confirm sub-5-minute pipeline.
#
# Concurrency: limited to 1 run at a time to reduce competing workflow load.
# NOT on sentinel watchlist — this is a test harness, not a production workflow.
#
# Run manually: Actions → Sentinel E2E SLA Test → Run workflow

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running (audit trail)'
        required: false
        default: 'P6-002 Sentinel E2E SLA verification'

concurrency:
  group: sentinel-sla-test
  cancel-in-progress: false

permissions:
  actions: write   # required to dispatch ci-canary-test.yml
  issues: read     # required to verify issue creation (secondary check)

jobs:
  assert-sentinel-sla:
    runs-on: ubuntu-latest
    steps:
      - name: Record baseline and start clock
        id: baseline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TRIGGER_TS=$(date +%s)
          echo "trigger_ts=${TRIGGER_TS}" >> $GITHUB_OUTPUT
          echo "=== Sentinel E2E SLA Test (P6-002) ==="
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Clock started: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""

          # Count existing sentinel runs so we can detect NEW ones after canary fires
          EXISTING_COUNT=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "workflow-sentinel.yml" \
            --limit 20 \
            --json databaseId \
            --jq 'length' 2>/dev/null || echo "0")

          echo "Existing sentinel run count (last 20): ${EXISTING_COUNT}"
          echo "existing_count=${EXISTING_COUNT}" >> $GITHUB_OUTPUT

      - name: Trigger CI Canary workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Dispatching CI Canary (Failure Test)..."
          gh workflow run ci-canary-test.yml \
            --repo "${{ github.repository }}" \
            --field reason="P6-002 SLA assertion trigger (automated)"
          echo "Canary dispatched. Waiting 15s for the run to register..."
          sleep 15

      - name: Wait for canary run to complete
        id: canary-wait
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Finding most recent ci-canary-test run..."

          CANARY_RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "ci-canary-test.yml" \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          echo "Canary run ID: ${CANARY_RUN_ID}"
          echo "canary_run_id=${CANARY_RUN_ID}" >> $GITHUB_OUTPUT

          # Poll up to 3 minutes for the canary to complete (it should exit fast)
          MAX_WAIT=18
          CONCLUSION=""
          for i in $(seq 1 $MAX_WAIT); do
            STATUS_JSON=$(gh run view "${CANARY_RUN_ID}" \
              --repo "${{ github.repository }}" \
              --json status,conclusion 2>/dev/null || echo '{}')
            STATUS=$(echo "$STATUS_JSON" | jq -r '.status // "unknown"')
            CONCLUSION=$(echo "$STATUS_JSON" | jq -r '.conclusion // ""')

            if [ -n "$CONCLUSION" ] && [ "$CONCLUSION" != "null" ]; then
              CANARY_DONE_TS=$(date +%s)
              echo "Canary completed: status=${STATUS} conclusion=${CONCLUSION}"
              echo "canary_done_ts=${CANARY_DONE_TS}" >> $GITHUB_OUTPUT
              echo "canary_conclusion=${CONCLUSION}" >> $GITHUB_OUTPUT
              break
            fi

            echo "  [${i}/${MAX_WAIT}] status=${STATUS} — waiting 10s..."
            sleep 10
          done

          if [ -z "$CONCLUSION" ] || [ "$CONCLUSION" = "null" ]; then
            echo "ERROR: Canary did not complete within 3 minutes"
            exit 1
          fi

      - name: Assert canary failed as expected
        run: |
          CONCLUSION="${{ steps.canary-wait.outputs.canary_conclusion }}"
          if [ "$CONCLUSION" != "failure" ]; then
            echo "ERROR: Canary should have concluded 'failure' — got: $CONCLUSION"
            exit 1
          fi
          echo "PASS: Canary concluded 'failure' as expected ✅"

      - name: Poll for sentinel workflow run (FR-9.1 / P6-002)
        id: poll-sentinel-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CANARY_DONE_TS: ${{ steps.canary-wait.outputs.canary_done_ts }}
          CANARY_RUN_ID: ${{ steps.canary-wait.outputs.canary_run_id }}
        run: |
          # P6-002: poll for a new workflow-sentinel.yml run triggered after canary completion.
          # This avoids the issue-polling approach that was vulnerable to GitHub event
          # delivery delays under high concurrency.
          MAX_POLLS=20   # 20 × 30s = 10 minutes max
          POLL_INTERVAL=30
          CANARY_DONE_ISO=$(date -u -d "@${CANARY_DONE_TS}" +%Y-%m-%dT%H:%M:%SZ)

          echo "Polling for new workflow-sentinel.yml run (triggered after ${CANARY_DONE_ISO})..."
          echo "Max wait: $((MAX_POLLS * POLL_INTERVAL))s"

          SENTINEL_RUN_ID=""
          for i in $(seq 1 $MAX_POLLS); do
            echo "Poll [${i}/${MAX_POLLS}] at $(date -u +%H:%M:%SZ)..."

            # Find sentinel runs started after canary completion
            SENTINEL_RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "workflow-sentinel.yml" \
              --limit 10 \
              --json databaseId,createdAt \
              --jq --arg since "${CANARY_DONE_ISO}" \
              '[.[] | select(.createdAt >= $since)] | .[0].databaseId // empty' \
              -r 2>/dev/null || true)

            if [ -n "$SENTINEL_RUN_ID" ] && [ "$SENTINEL_RUN_ID" != "null" ]; then
              ELAPSED=$(( $(date +%s) - CANARY_DONE_TS ))
              echo "FOUND: Sentinel run #${SENTINEL_RUN_ID} appeared after ${ELAPSED}s"
              echo "sentinel_run_id=${SENTINEL_RUN_ID}" >> $GITHUB_OUTPUT
              echo "sentinel_appeared_elapsed=${ELAPSED}" >> $GITHUB_OUTPUT
              echo "sentinel_found=true" >> $GITHUB_OUTPUT
              break
            fi

            echo "  No new sentinel run yet..."
            if [ "$i" -lt "$MAX_POLLS" ]; then
              sleep $POLL_INTERVAL
            fi
          done

          if [ -z "$SENTINEL_RUN_ID" ] || [ "$SENTINEL_RUN_ID" = "null" ]; then
            ELAPSED=$(( $(date +%s) - CANARY_DONE_TS ))
            echo "TIMEOUT: No sentinel run appeared in $((MAX_POLLS * POLL_INTERVAL))s"
            echo "sentinel_found=false" >> $GITHUB_OUTPUT
            echo "sentinel_appeared_elapsed=${ELAPSED}" >> $GITHUB_OUTPUT
          fi

      - name: Wait for sentinel run to complete
        id: sentinel-complete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTINEL_RUN_ID: ${{ steps.poll-sentinel-run.outputs.sentinel_run_id }}
          SENTINEL_FOUND: ${{ steps.poll-sentinel-run.outputs.sentinel_found }}
          CANARY_DONE_TS: ${{ steps.canary-wait.outputs.canary_done_ts }}
        run: |
          if [ "${SENTINEL_FOUND}" != "true" ]; then
            echo "Sentinel run not found — skipping completion wait."
            echo "sentinel_conclusion=not_found" >> $GITHUB_OUTPUT
            echo "sentinel_total_elapsed=n/a" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Waiting for sentinel run #${SENTINEL_RUN_ID} to complete..."
          MAX_WAIT=20   # 20 × 15s = 5 additional minutes
          CONCLUSION=""
          for i in $(seq 1 $MAX_WAIT); do
            STATUS_JSON=$(gh run view "${SENTINEL_RUN_ID}" \
              --repo "${{ github.repository }}" \
              --json status,conclusion 2>/dev/null || echo '{}')
            STATUS=$(echo "$STATUS_JSON" | jq -r '.status // "unknown"')
            CONCLUSION=$(echo "$STATUS_JSON" | jq -r '.conclusion // ""')

            if [ -n "$CONCLUSION" ] && [ "$CONCLUSION" != "null" ]; then
              TOTAL_ELAPSED=$(( $(date +%s) - CANARY_DONE_TS ))
              echo "Sentinel run completed: status=${STATUS} conclusion=${CONCLUSION}"
              echo "Total elapsed (canary done → sentinel done): ${TOTAL_ELAPSED}s"
              echo "sentinel_conclusion=${CONCLUSION}" >> $GITHUB_OUTPUT
              echo "sentinel_total_elapsed=${TOTAL_ELAPSED}" >> $GITHUB_OUTPUT
              break
            fi

            echo "  [${i}/${MAX_WAIT}] status=${STATUS} — waiting 15s..."
            sleep 15
          done

          if [ -z "$CONCLUSION" ] || [ "$CONCLUSION" = "null" ]; then
            TOTAL_ELAPSED=$(( $(date +%s) - CANARY_DONE_TS ))
            echo "Sentinel run did not complete within wait window"
            echo "sentinel_conclusion=timed_out" >> $GITHUB_OUTPUT
            echo "sentinel_total_elapsed=${TOTAL_ELAPSED}" >> $GITHUB_OUTPUT
          fi

      - name: Assert FR-9.1 SLA met
        env:
          SENTINEL_FOUND: ${{ steps.poll-sentinel-run.outputs.sentinel_found }}
          SENTINEL_RUN_ID: ${{ steps.poll-sentinel-run.outputs.sentinel_run_id }}
          SENTINEL_APPEARED_ELAPSED: ${{ steps.poll-sentinel-run.outputs.sentinel_appeared_elapsed }}
          SENTINEL_CONCLUSION: ${{ steps.sentinel-complete.outputs.sentinel_conclusion }}
          SENTINEL_TOTAL_ELAPSED: ${{ steps.sentinel-complete.outputs.sentinel_total_elapsed }}
          SLA_THRESHOLD: "600"
        run: |
          echo ""
          echo "=== FR-9.1 SLA Assertion Results (P6-002) ==="
          echo "Sentinel run found:      ${SENTINEL_FOUND}"
          echo "Sentinel run ID:         #${SENTINEL_RUN_ID:-none}"
          echo "Elapsed (appeared):      ${SENTINEL_APPEARED_ELAPSED}s"
          echo "Sentinel conclusion:     ${SENTINEL_CONCLUSION:-unknown}"
          echo "Elapsed (total / done):  ${SENTINEL_TOTAL_ELAPSED}s"
          echo "SLA threshold:           ${SLA_THRESHOLD}s"
          echo ""

          if [ "${SENTINEL_FOUND}" != "true" ]; then
            echo "FAIL: No new workflow-sentinel.yml run appeared within poll window ❌"
            echo "This indicates GitHub did not deliver the workflow_run event to the sentinel."
            echo "Check: Actions → workflow-sentinel.yml for recent skipped/cancelled runs."
            exit 1
          fi

          if [ "${SENTINEL_CONCLUSION}" = "not_found" ] || [ "${SENTINEL_CONCLUSION}" = "timed_out" ]; then
            echo "FAIL: Sentinel run #${SENTINEL_RUN_ID} did not complete within wait window ❌"
            exit 1
          fi

          if [ "${SENTINEL_CONCLUSION}" != "success" ]; then
            echo "FAIL: Sentinel run #${SENTINEL_RUN_ID} concluded '${SENTINEL_CONCLUSION}' (expected 'success') ❌"
            exit 1
          fi

          # SLA check: sentinel must have appeared within 600s of canary completion
          if echo "${SENTINEL_APPEARED_ELAPSED}" | grep -qE '^[0-9]+$'; then
            if [ "${SENTINEL_APPEARED_ELAPSED}" -gt "${SLA_THRESHOLD}" ]; then
              echo "FAIL: Sentinel run appeared but took ${SENTINEL_APPEARED_ELAPSED}s > ${SLA_THRESHOLD}s SLA ❌"
              exit 1
            fi
          fi

          echo "PASS: Sentinel run #${SENTINEL_RUN_ID} appeared in ${SENTINEL_APPEARED_ELAPSED}s, concluded 'success' ✅"
          echo "FR-9.1 SLA VERIFIED ✅"

      - name: Measure GitHub API latency from CI runner (P8-005 / P6-007 / NFR-2.2)
        id: api-latency
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          LATENCY_THRESHOLD_MS: "500"
        run: |
          # P8-005: Measure GitHub API round-trip latency from this CI runner.
          # From a GitHub-hosted runner (same datacenter as GitHub API), latency is
          # typically 50-200ms — well under the 500ms NFR-2.2 threshold.
          # P5-007 measured 520ms local; CI runner expected to easily pass 500ms.
          echo "=== GitHub API Latency Benchmark (P8-005 / P6-007 / NFR-2.2) ==="
          echo "Threshold: ${LATENCY_THRESHOLD_MS}ms"
          LATENCIES=()
          for RUN in 1 2 3 4 5; do
            START_NS=$(date +%s%N)
            gh api "repos/${REPO}" --silent
            END_NS=$(date +%s%N)
            ELAPSED_MS=$(( (END_NS - START_NS) / 1000000 ))
            LATENCIES+=($ELAPSED_MS)
            echo "  Run ${RUN}: ${ELAPSED_MS}ms"
          done
          # Calculate median of 5 samples
          SORTED=($(printf '%s\n' "${LATENCIES[@]}" | sort -n))
          MEDIAN=${SORTED[2]}
          echo "Latency samples: ${LATENCIES[*]}"
          echo "Median latency: ${MEDIAN}ms"
          echo "api_latency_median_ms=${MEDIAN}" >> $GITHUB_OUTPUT
          if [ "$MEDIAN" -le "$LATENCY_THRESHOLD_MS" ]; then
            echo "PASS: ${MEDIAN}ms <= ${LATENCY_THRESHOLD_MS}ms threshold ✅"
            echo "api_latency_result=PASS" >> $GITHUB_OUTPUT
          else
            echo "CONDITIONAL: ${MEDIAN}ms > ${LATENCY_THRESHOLD_MS}ms threshold ⚠️"
            echo "(Not failing — latency varies by runner region and load)"
            echo "api_latency_result=CONDITIONAL" >> $GITHUB_OUTPUT
          fi

      - name: Write step summary
        if: always()
        env:
          SENTINEL_FOUND: ${{ steps.poll-sentinel-run.outputs.sentinel_found }}
          SENTINEL_RUN_ID: ${{ steps.poll-sentinel-run.outputs.sentinel_run_id }}
          SENTINEL_APPEARED_ELAPSED: ${{ steps.poll-sentinel-run.outputs.sentinel_appeared_elapsed }}
          SENTINEL_CONCLUSION: ${{ steps.sentinel-complete.outputs.sentinel_conclusion }}
          SENTINEL_TOTAL_ELAPSED: ${{ steps.sentinel-complete.outputs.sentinel_total_elapsed }}
          CANARY_RUN_ID: ${{ steps.canary-wait.outputs.canary_run_id }}
          CANARY_CONCLUSION: ${{ steps.canary-wait.outputs.canary_conclusion }}
        run: |
          echo "## Sentinel E2E SLA Test — P6-002 (FR-9.1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Canary Run ID | [${CANARY_RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${CANARY_RUN_ID}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Canary Conclusion | ${CANARY_CONCLUSION:-unknown} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sentinel Run ID | ${SENTINEL_RUN_ID:-not found} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sentinel Appeared (elapsed from canary done) | ${SENTINEL_APPEARED_ELAPSED:-n/a}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Sentinel Conclusion | ${SENTINEL_CONCLUSION:-unknown} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sentinel Total Elapsed (canary done → sentinel done) | ${SENTINEL_TOTAL_ELAPSED:-n/a}s |" >> $GITHUB_STEP_SUMMARY
          echo "| SLA Threshold | 600s |" >> $GITHUB_STEP_SUMMARY
          echo "| FR-9.1 SLA Result | $([ \"${SENTINEL_FOUND}\" = 'true' ] && [ \"${SENTINEL_CONCLUSION}\" = 'success' ] && echo '✅ PASS' || echo '❌ FAIL') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_P6-002: Polls for new workflow-sentinel.yml run (not issue) to reduce event delivery dependency._" >> $GITHUB_STEP_SUMMARY
          echo "_600s threshold covers full E2E pipeline (detect + LLM classify + issue create)._" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub API Latency (P8-005 / P6-007 / NFR-2.2)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Median Latency | ${{ steps.api-latency.outputs.api_latency_median_ms }}ms |" >> $GITHUB_STEP_SUMMARY
          echo "| Threshold | 500ms |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ steps.api-latency.outputs.api_latency_result }} |" >> $GITHUB_STEP_SUMMARY
