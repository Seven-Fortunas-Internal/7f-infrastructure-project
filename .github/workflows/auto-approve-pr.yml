name: Auto-Approve PR (7f-ci-bot)

# Automatically approves PRs opened by jorge-at-sf using the 7f-ci-bot account.
# The review requirement is satisfied by the bot; CI status checks still gate
# the actual merge — branch protection enforces both independently.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]

concurrency:
  group: auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: github.actor == 'jorge-at-sf'

    steps:
      - name: Approve PR via 7f-ci-bot
        run: |
          gh pr review "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --approve \
            --body "Auto-approved by 7f-ci-bot. CI status checks still required to merge."
        env:
          GH_TOKEN: ${{ secrets.APPROVER_PAT }}
